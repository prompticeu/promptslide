[package]
name = "promptslide-app"
version = "0.1.0"
description = "PromptSlide Desktop App"
authors = ["prompticeu"]
edition = "2021"

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "5"

[build-dependencies]
tauri-build = { version = "2", features = [] }
